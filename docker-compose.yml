version: '3'

services:

  webapp:
    build: .
    container_name: node-webapp

    restart: always

    ports:
      - "3000:3000"

  nginx:
    image: nginx:latest
    container_name: nginx

    restart: always

    ports:
      - "80:80"

    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf

    depends_on:
      - webapp